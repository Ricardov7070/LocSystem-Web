services:

# Container de Aplicação Laravel-1
  laravel-1:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: laravel-1
    restart: always
    tty: true
    environment:
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - .:/var/www/laravel
    depends_on:
      - mysql
      - redis
    networks:
      - laravel_app
    command: >
      sh -c "
      echo '📦 Installing Composer dependencies...' &&
      composer install --no-dev --optimize-autoloader &&
      if [ ! -d vendor/predis ]; then composer require predis/predis; fi &&

      echo '🗑 Clearing Laravel cache...' &&
      php artisan config:clear &&
      php artisan cache:clear &&

      echo '⚡Running migrations and seeders...' &&
      php artisan migrate --seed --force &&

      echo '🔐 Publishing Laravel Sanctum...' &&
      php artisan vendor:publish --provider='Laravel\\Sanctum\\SanctumServiceProvider' &&

      echo '🔐 Publishing Swagger...' &&
      php artisan vendor:publish --provider='L5Swagger\L5SwaggerServiceProvider' &&

      echo '🌐 Configuring permissions...' &&
      chown -R www-data:www-data /var/www/laravel/storage /var/www/laravel/bootstrap/cache &&
      chmod -R 775 /var/www/laravel/storage /var/www/laravel/bootstrap/cache &&

      echo '✅ Initialization complete!' &&
      exec php-fpm"


# Container de Aplicação Laravel-2
  laravel-2:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: laravel-2
    restart: always
    tty: true
    environment:
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql 
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - .:/var/www/laravel
    depends_on:
      - mysql
      - redis
    networks:
      - laravel_app
    command: >
      sh -c "
      echo '🔑 Generating application key...' &&
      php artisan key:generate &&

      echo '✅ Initialization complete!' &&
      exec php-fpm"


# Container de Aplicação Laravel-3
  laravel-3:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: laravel-3
    restart: always
    tty: true
    environment:
      APP_ENV: ${APP_ENV}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - .:/var/www/laravel
    depends_on:
      - mysql
      - redis
    networks:
      - laravel_app


# Container de Aplicação React
  react:
    build:
      context: ../Person-Frontend-LocSystem  
      dockerfile: docker/Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: react-container
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - VITE_API_BASE_URL=http://localhost:90/api
    ports:
      - "5174:5173"
    volumes:
      - ../Person-Frontend-LocSystem:/app
      - /app/node_modules 
    stdin_open: true
    tty: true
    depends_on:
      - nginx
    networks:
      - laravel_app
    env_file:
      - .env
    command: sh -c "yarn install && yarn dev --host 0.0.0.0"


# Container Mysql
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - laravel_app
      

# Container Redis
  redis:
    image: redis:alpine
    container_name: redis-container
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - laravel_app


# Container Mailhog
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog-container
    restart: always
    ports:
      - "1026:1025" # SMTP
      - "8026:8025" # Web UI
    networks:
      - laravel_app


# Container Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx-container
    restart: always
    volumes:
      - .:/var/www/laravel
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "90:90"
    depends_on:
      - laravel-1
      - laravel-2
      - laravel-3
    networks:
      - laravel_app


# Container Ngrok
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok-container
    restart: always
    environment:
      - NGROK_AUTHTOKEN=2pSWLJmWY9h42RfQacngPjR3NV7_46y2urodZwKejHA8iHSKi
    command: http nginx:90
    networks:
      - laravel_app
    depends_on:
      - nginx
    ports:
      - "4042:4040"

networks:
  laravel_app:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
